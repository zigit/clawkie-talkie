name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - 'feature/**'

permissions:
  contents: read

jobs:
  web-and-android:
    name: Web + Android gates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install web dependencies
        run: npm ci

      - name: Check web Android version sync
        run: npm run version:check

      - name: Run web tests
        run: npm test

      - name: Typecheck web daemon signaling
        run: npm run typecheck

      - name: Build web client
        run: npm run build

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0" "platform-tools"

      - name: Run Android unit tests
        working-directory: android
        run: ./gradlew testDebugUnitTest --stacktrace

      - name: Assemble Android debug APK
        working-directory: android
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: clawkie-talkie-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
